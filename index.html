<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="whole-body">
        <div class="header">
            <p class="app-name">CALCULATOR</p>
        </div>

        <div class="answer-box">

        </div>

        <div class="tool-box">
           <div class="tools-row">
                <div class="tools">7</div>
                <div class="tools">8</div>
                <div class="tools">9</div>
                <div class="del-box">DEL</div>
           </div class="tools">

           <div class="tools-row">
                <div class="tools">4</div>
                <div class="tools">5</div>
                <div class="tools">6</div>
                <div class="tools">+</div>
           </div>

           <div class="tools-row">
                <div class="tools">1</div>
                <div class="tools">2</div>
                <div class="tools">3</div>
                <div class="tools">-</div>
           </div>

           <div class="tools-row">
                <div class="tools">.</div>
                <div class="tools">0</div>
                <div class="tools">/</div>
                <div class="tools">*</div>
           </div>

           <div class="adv-tools">
                <div class="reset">RESET</div>
                <div class="equal">=</div>
           </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
